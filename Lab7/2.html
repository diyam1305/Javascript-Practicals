<!DOCTYPE html>
<html>
<head>
    <title></title>
</head>
<body>

<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Username</th>
    </tr>
</table>

<script>
fetch("https://jsonplaceholder.typicode.com/users")
.then(res => res.json())
.then(data => {
    let table = document.querySelector("table");
    data.forEach(u => {
        table.innerHTML += `
            <tr>
                <td>${u.id}</td>
                <td>${u.name}</td>
                <td>${u.email}</td>
                <td>${u.username}</td>
            </tr>
        `;
    });
});
</script>
</body>
</html>
