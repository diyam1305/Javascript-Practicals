<!DOCTYPE html>
<html>
    <head>
        <title></title>
    </head>
    <body>
        <script>
            let str = prompt("Enter a string:");
            let chars = str.split("").reverse().join("");

            if (str === chars) 
            {
                console.log("Palindrome");
            } 
            else 
            {
                console.log("Not a palindrome");
            }
        </script>
    </body>
</html>
