<!DOCTYPE html>
<html>
    <head>
        <title></title>
    </head>
    <body>
        <script>
            class Student {
                constructor(name, roll) {
                    this.name = name;
                    this.roll = roll;
                }
                display() {
                    console.log(`Name: ${this.name}, Roll No: ${this.roll}`);
                }
            }
            const s1 = new Student("xyz", 101);
            s1.display();
        </script>
    </body>
</html>
