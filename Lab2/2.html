<!DOCTYPE html>
<html>
    <head>
        <title></title>
    </head>
    <body>
        <script>
            let n = parseInt(prompt("Enter n:"));
            let i = 1, fact = 1;
            while(i<=n)
            {
                fact = fact * i;
                i++;
            }
            console.log(`Factorial is: ${fact}`);
        </script>
    </body>
</html>
